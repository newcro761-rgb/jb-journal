name: Premarket Theme Check

on:
  schedule:
    # UTC 21:00 = KST 06:00 (다음날), 미국 정규장 마감 직후. 2026-07-03 첫 실전
    # 실행에서 GitHub Actions 스케줄러가 목표 시각(당시 06:45 KST)보다 1시간이나
    # 늦게(07:45 KST) 큐잉된 사례가 있었다 — GitHub 무료 티어의 scheduled cron은
    # 정확한 시각을 보장하지 않고 부하 시 크게 밀릴 수 있다고 공식 문서에도 명시돼
    # 있으므로, 07:00 목표에 맞추려던 06:45보다 45분 더 앞당겨 여유를 키운다.
    # 미장 데이터는 이미 마감된 데이터라 몇 시에 조회해도 동일하므로 당겨도 손해 없음.
    # 대체거래소 NXT가 08:00 KST에 열리므로 그 전에 반드시 끝나야 한다.
    - cron: '0 21 * * 0-4'
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance requests
      - run: python scripts/premarket_check.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
